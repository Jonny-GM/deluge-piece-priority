name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      # Tests import the real `deluge` and `libtorrent` packages (see
      # AGENTS.md's "Development environment"). libtorrent's compiled
      # extension is tied to a specific Python ABI, so it comes from apt
      # against the runner's system Python rather than PyPI -- the venv
      # below is built with --system-site-packages to see it, same as a
      # local dev setup.
      - name: Install system libtorrent
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-libtorrent

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up venv
        run: |
          uv venv --system-site-packages .venv
          uv pip install --python .venv/bin/python -e . --group dev

      - name: pytest
        run: .venv/bin/python -m pytest tests/

      - name: ty check
        run: .venv/bin/ty check

      - name: JS syntax check
        run: node --check deluge_piecepriority/data/piecepriority.js

  # The floor of the supported range (docs/spec/05-packaging-compat.md,
  # "Python version"): released Deluge 2.2 still runs on 3.9 (Debian 11
  # ships exactly that pairing), so the plugin must too. The runner's apt
  # libtorrent targets the system Python only, so this job takes
  # libtorrent from PyPI (which publishes cp39 wheels) instead of apt.
  #
  # pytest only, no ty: static checking already targets the 3.9 floor in
  # the job above (ty reads requires-python), and this venv's PyPI
  # provisioning resolves a different set of modules/stubs (libtorrent
  # with stubs, no gi, no pkg_resources) than the apt one — it would need
  # its own contradictory suppression set for zero added coverage. What
  # only this job can prove is that the code runs on a real 3.9.
  test-floor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up venv
        run: |
          uv venv -p 3.9 .venv
          uv pip install --python .venv/bin/python -e . --group dev libtorrent

      - name: pytest
        run: .venv/bin/python -m pytest tests/
